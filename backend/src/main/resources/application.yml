server:
  port: 8080

spring:
  application:
    name: interview-prep-backend
  datasource:
    url: jdbc:h2:file:./data/interviewdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  base-url: https://api.openai.com
  max-tokens: 2048

app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  jwt-secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-32-chars!!}
  jwt-expiry-ms: ${JWT_EXPIRY_MS:86400000}
  storage:
    path: ${STORAGE_PATH:./uploads}
