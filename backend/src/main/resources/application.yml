server:
  port: 8080

logging:
  level:
    root: INFO
    com.interviewprep: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

spring:
  application:
    name: interview-prep-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:interviewprep}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:admin}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: app
        format_sql: true
        hbm2ddl:
          create_namespaces: true
    show-sql: false

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  base-url: https://api.openai.com
  max-tokens: 2048

claude:
  api-key: ${CLAUDE_API_KEY:}
  model: ${CLAUDE_MODEL:claude-haiku-4-5-20251001}

app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  jwt-secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-32-chars!!}
  jwt-expiry-ms: ${JWT_EXPIRY_MS:86400000}
  storage:
    path: ${STORAGE_PATH:./uploads}
  master-pdf:
    path: ${MASTER_PDF_PATH:./data/master_questions.pdf}
    json-path: ${MASTER_JSON_PATH:./data/master_questions.json}
